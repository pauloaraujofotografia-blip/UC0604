<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Aula 7</title>
    <link rel="stylesheet" href="aula_7.css">
</head>
<body>

    <h1>Título Principal</h1>
    <h2>Subtítulo</h2>

    <p>Exemplos de sintaxe de CSS e regras de especificidade.</p>

    <nav>
        <a href="#">Início</a>
        <a href="#" class="active">Serviços</a>
        <a href="#" class="active importante">Blog</a>
        <a href="#" style="color: darkred;">Contacto com CSS inline</a>
    </nav>

    <div class="caixa">
        <p>Exemplos dentro de uma <code>div</code>:</p>
        <a href="#">Link normal</a>
        <a href="#" class="active">Link com classe .active</a>
        <a href="#" id="link-prioritario">Link com id</a>
        <a href="#" class="importante">Link com !important</a>
    </div>

</body>
</html>
