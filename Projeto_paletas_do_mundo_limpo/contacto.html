<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestões — Paletas de Cores</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="body-noir"> <header class="header-noir">
        <h1>Entra em contacto</h1>
        <nav>
            <a href="index.html">Portugal</a>
            <a href="japao.html">Japão</a>
            <a href="marrocos.html">Marrocos</a>
            <a href="noir.html">Noir</a>
            <a href="contacto.html" class="active">Sugestões</a>
        </nav>
    </header>

    <main>
        <section class="hero hero-contacto">
            <div class="hero-overlay">
                <h2>Fala connosco</h2>
                <p>
                    Tens uma ideia, um projeto ou apenas queres trocar impressões?
                    Envia uma mensagem — responderemos logo que possível.
                </p>
            </div>
        </section>

        <section class="form-container">
            <form class="contact-form" action="#" method="post">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required placeholder="O teu nome">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="exemplo@email.com">

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="6" required placeholder="Escreve aqui a tua sugestão ou dúvida..."></textarea>

                <button type="submit" class="btn-submit">Enviar mensagem</button>
            </form>
        </section>
    </main>

    <footer class="footer-noir">
        <p>© 2026 Paulo Araújo</p>
    </footer>

</body>
</html>
